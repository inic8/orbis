model:
  base_learning_rate: 1.0e-05
  adjust_learning_rate: false
  find_unused_parameters: true
  gradient_clip_algorithm: norm
  precision: 16-mixed
  grad_clip: 1.0
  grad_acc_steps: 1
  target: postprocessing.stage1_recovery.Stage1RecoveryModelIF
  params:
    student_checkpoint: /mnt/models/orbis/logs_wm/orbis_288x512_pruned/checkpoints/last.ckpt
    teacher_checkpoint: /mnt/models/orbis/logs_wm/orbis_288x512/checkpoints/last.ckpt
    teacher_use_ema: true
    output_distill_weight: 0.25
    weight_decay: 0.01
    strict_checkpoint_load: true
    train_space_mlp: true
    train_time_mlp: true
    train_adaln: true
    train_time_attn_modulation: true
    train_final_layer: true
    train_t_embedder: true
    train_frame_emb: true
    warmup_steps: 1000
    min_lr_multiplier: 0.2
    enc_scale: 4
    enc_scale_dino: 4
    adjust_lr_to_batch_size: false
    tokenizer_config:
      folder: /mnt/models/orbis/logs_tk/tokenizer_288x512
      ckpt_path: checkpoints/tokenizer_288x512.ckpt
    generator_config:
      target: networks.DiT.dit.SwinSTDiTNoExtraMLP
      params:
        modulate_time_attn: true
        window_size:
        - 6
        - 4
        causal_time_attn: true
        max_num_frames: 6
        hidden_size: 768
        depth: 24
        num_heads: 16
        mlp_ratio: 3.1666666666666665
        input_size:
        - 18
        - 32
        patch_size: 1
        in_channels: 32
        dropout: 0.0
        ctx_noise_aug_ratio: 0.1
        ctx_noise_aug_prob: 0.5
        drop_ctx_rate: 0.5
    teacher_generator_config:
      target: networks.DiT.dit.SwinSTDiTNoExtraMLP
      params:
        modulate_time_attn: true
        window_size:
        - 6
        - 4
        causal_time_attn: true
        max_num_frames: 6
        hidden_size: 768
        depth: 24
        num_heads: 16
        mlp_ratio: 4.0
        input_size:
        - 18
        - 32
        patch_size: 1
        in_channels: 32
        dropout: 0.0
        ctx_noise_aug_ratio: 0.1
        ctx_noise_aug_prob: 0.5
        drop_ctx_rate: 0.5
data:
  target: data.datamodule.DataModuleFromConfig
  params:
    batch_size: 4
    num_workers: 4
    train:
      target: data.custom_multiframe.MultiHDF5DatasetMultiFrameRandomizeFrameRate
      params:
        hdf5_paths_file: /path/to/video/data/train.txt
        size:
        - 288
        - 512
        num_frames: 6
        stored_data_frame_rate: 5
        frame_rates_and_weights:
        - - 5
          - 1
        aug: random_shift
        scale_min: 0.15
        scale_max: 0.5
    validation:
      target: data.custom_multiframe.MultiHDF5DatasetMultiFrameFromJSONFrameRateWrapper
      params:
        samples_json: /path/to/video/data/validation.json
        size:
        - 288
        - 512
        num_frames: 6
        stored_data_frame_rate: 5
        frame_rate: 5